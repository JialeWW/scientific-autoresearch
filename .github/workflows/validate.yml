name: package-and-test-consistency

on:
  push:
  pull_request:

jobs:
  package-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Package consistency
        run: python scripts/validate_skill.py scientific-autoresearch
      - name: Lightweight installable archive
        run: python scripts/build_installable_skill.py scientific-autoresearch "$RUNNER_TEMP/scientific-autoresearch-skill.zip"
      - name: Validate extracted runtime-only archive
        run: |
          extract_root="$(mktemp -d)"
          unzip -q "$RUNNER_TEMP/scientific-autoresearch-skill.zip" -d "$extract_root"
          python scripts/validate_skill.py "$extract_root/scientific-autoresearch"
      - name: Lightweight install-surface regression
        run: python -m unittest discover -s tests -v
      - name: Benchmark-scorer smoke fixture
        run: python benchmarks/score.py --self-test
      - name: Historical protocol-2.0.0 scorer smoke fixture
        run: python benchmarks/score-v2.0.0.py --self-test
      - name: Protocol-2.1.1 scorer smoke fixture
        run: python benchmarks/score-v2.1.1.py --self-test
      - name: Protocol-2.1.2 scorer and frozen-chain replay
        run: python benchmarks/score-v2.1.2.py --self-test
      - name: Protocol-2.1.1 end-to-end shakedown replay
        run: |
          output_root="$(mktemp -d)/shakedown"
          python benchmarks/shakedown-harness.py --output-root "$output_root"
          cmp benchmarks/executions/shakedown-v2.1.1/records.jsonl "$output_root/records.jsonl"
          cmp benchmarks/executions/shakedown-v2.1.1/result.json "$output_root/result.json"
          cmp benchmarks/executions/shakedown-v2.1.1/execution-receipt.json "$output_root/execution-receipt.json"
          diff -qr benchmarks/executions/shakedown-v2.1.1/evidence "$output_root/evidence"
      - name: Protocol-2.1.2 end-to-end shakedown replay
        run: |
          output_root="$(mktemp -d)/shakedown"
          python benchmarks/shakedown-harness-v2.1.2.py --output-root "$output_root"
          cmp benchmarks/executions/shakedown-v2.1.2/records.jsonl "$output_root/records.jsonl"
          cmp benchmarks/executions/shakedown-v2.1.2/result.json "$output_root/result.json"
          cmp benchmarks/executions/shakedown-v2.1.2/execution-receipt.json "$output_root/execution-receipt.json"
          diff -qr benchmarks/executions/shakedown-v2.1.2/evidence "$output_root/evidence"
      - name: Independent benchmark-scorer tests
        run: python -m unittest discover -s benchmarks/tests -v
